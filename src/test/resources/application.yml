spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop

  cloud:
    function:
      scan:
        enabled: false
    stream:
      enabled: false


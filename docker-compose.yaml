services:
  postgres:
    image: postgres:15
    container_name: restaurant_db
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: restaurant_user
      POSTGRES_PASSWORD: restaurant_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-init db.d/01-schema.sql
      - ./src/main/resources/data.sql:/docker-entrypoint-init db.d/02-data.sql

volumes:
  postgres_data:
